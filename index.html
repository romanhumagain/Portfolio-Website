<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Announcement</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            background-color: #f3f4f6;
        }

        .announcement {
            padding: 20px 40px;
            background-color: #2c3e50;
            border-radius: 10px;
            color: #ecf0f1;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .announcement:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
        }

        .main-text {
            font-size: 24px;
            margin: 0;
            margin-bottom: 10px;
        }

        .stay-tuned {
            font-size: 18px;
            margin: 0;
        }

        @media only screen and (max-width: 600px) {
            .announcement {
                padding: 15px 30px;
            }

            .main-text {
                font-size: 18px;
                margin-bottom: 5px;
            }

            .stay-tuned {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="announcement">
        <p class="main-text">I'm in the process of designing a new portfolio site  !!</p>
        <p class="stay-tuned">Stay tuned!</p>
    </div>
</body>
</html>
