<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Portfolio</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <a class="navbar-brand" href="#">My Portfolio</a>
  </nav>

  <!-- Hero Section -->
  <header class="jumbotron mt-4">
      <h1 class="display-4">Hello, I'm John!</h1>
      <p class="lead">A Web Developer based in San Francisco.</p>
  </header>

  <!-- Portfolio Section -->
  <section class="container mt-5">
      <h2 class="text-center mb-4">My Works</h2>

      <div class="row">
          <div class="col-md-4 mb-4">
              <div class="card">
                  <img src="path-to-your-image1.jpg" class="card-img-top" alt="Project 1">
                  <div class="card-body">
                      <h5 class="card-title">Project 1</h5>
                      <p class="card-text">Description for project 1.</p>
                  </div>
              </div>
          </div>

          <div class="col-md-4 mb-4">
              <div class="card">
                  <img src="path-to-your-image2.jpg" class="card-img-top" alt="Project 2">
                  <div class="card-body">
                      <h5 class="card-title">Project 2</h5>
                      <p class="card-text">Description for project 2.</p>
                  </div>
              </div>
          </div>

          <div class="col-md-4 mb-4">
              <div class="card">
                  <img src="path-to-your-image3.jpg" class="card-img-top" alt="Project 3">
                  <div class="card-body">
                      <h5 class="card-title">Project 3</h5>
                      <p class="card-text">Description for project 3.</p>
                  </div>
              </div>
          </div>
      </div>
  </section>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
      <p>© 2023 by John Doe. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS (Optional, but including for any potential Bootstrap JavaScript functionality) -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
